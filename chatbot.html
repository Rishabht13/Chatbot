<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="navbar"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputValue, setInputValue] = React.useState("");
        function saveInput(event) {
          setInputValue(event.target.value);
        }
        function send(){
            const newMessage = [
            ...chatMessages,
            {
              message: inputValue,
              sender: "user",
              id: crypto.randomUUID(),
            },
          ];
           setChatMessages(newMessage);

            const response = Chatbot.getResponse(inputValue);
            setChatMessages([
              ...newMessage,
              {
                message: response,
                sender: "bot",
                id: crypto.randomUUID(),
              },
            ]);
            setInputValue("");
        }
        return (
          <>
            <input type="text" placeholder="Type your message here..."
            value={inputValue}
            onChange={saveInput} />
            <button onClick={send}>Send</button>
            
          </>
        );
      }
      function ChatMessage(props) {
        // const message = props.message || "Hello! How can I assist you today?";
        // const sender = props.sender || "bot";
        const { message, sender } = props;
        /*   if(sender === "bot"){
                return(
                    <div>
                        <img src = "robot.png" alt="Bot Avatar"
                        width="50"
                        height="50" />
                    {message}
                    </div>
                );
                }
                */
        return (
          <div>
            {sender === "bot" && <img src="robot.png" alt="Bot Avatar" width="50" height="50" />}
              {message}
            {sender === "user" && <img src="user.png" alt="User Avatar" width="50" height="50" />}
          </div>
        );
      }
      function ChatMessages({ chatMessages }) {
         
        return (
          <>
            {chatMessages.map((msg) => {
              return <ChatMessage key={msg.id} message={msg.message} sender={msg.sender} />;
            })}
          </>
        );
      };
     

      function App() {
        const [chatMessages, setChatMessages] = React.useState([]);
        //const chatMessages = array[0];
        //const setChatMessages = array[1];
       // const [chatMessages, setChatMessages] = array; 
        return (
          <>
             
            <h1>Chatbot</h1>
            <ChatInput 
            chatMessages={chatMessages}
            setChatMessages={setChatMessages}
            />
            <ChatMessages
            chatMessages={chatMessages}
            />
          </>
        );
      };

      const container = document.querySelector(".navbar");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
