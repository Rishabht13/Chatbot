<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="navbar"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput() {
        return (
          <>
            <input type="text" placeholder="Type your message here..." />
            <button>Send</button>
          </>
        );
      }
      function ChatMessage(props) {
        // const message = props.message || "Hello! How can I assist you today?";
        // const sender = props.sender || "bot";
        const { message, sender } = props;
        /*   if(sender === "bot"){
                return(
                    <div>
                        <img src = "robot.png" alt="Bot Avatar"
                        width="50"
                        height="50" />
                    {message}
                    </div>
                );
                }
                */
        return (
          <div>
            {sender === "bot" && <img src="robot.png" alt="Bot Avatar" width="50" height="50" />}
            {message}
            {sender === "user" && <img src="user.png" alt="User Avatar" width="50" height="50" />}
          </div>
        );
      }
      function ChatMessages() {
        const chatMessages = [
          {
            message: "Hi Chatbot!",
            sender: "user",
            id: 1,
          },
          {
            message: "Hey There!",
            sender: "bot",
            id: 2,
          },
          {
            message: "Whats the date today?",
            sender: "user",
            id: 3,
          },
          {
            message: "Today is 26 May",
            sender: "bot",
            id: 4,
          },
        ];
        return (
          <>
            {chatMessages.map((msg) => {
              return <ChatMessage key={msg.id} message={msg.message} sender={msg.sender} />;
            })}
          </>
        );
      }

      function App() {
        return (
          <>
            <h1>Chatbot</h1>
            <ChatInput />
            <ChatMessages/>
          </>
        );
      }

      const container = document.querySelector(".navbar");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
