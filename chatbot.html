<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="navbar"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput() {
        return (
          <>
            <input type="text" placeholder="Type your message here..." />
            <button>Send</button>
          </>
        );
      }
      function ChatMessage(props) {
        // const message = props.message || "Hello! How can I assist you today?";
        // const sender = props.sender || "bot";
        const { message, sender } = props;
        /*   if(sender === "bot"){
                return(
                    <div>
                        <img src = "robot.png" alt="Bot Avatar"
                        width="50"
                        height="50" />
                    {message}
                    </div>
                );
                }
                */
        return (
          <div>
            {sender === "bot" && <img src="robot.png" alt="Bot Avatar" width="50" height="50" />}
            {message}
            {sender === "user" && <img src="user.png" alt="User Avatar" width="50" height="50" />}
          </div>
        );
      }

      const inp = (
        <>
          <h1>Chatbot</h1>
          <ChatInput />
          <ChatMessage message="Hi Chatbot!" sender="user" />
          <ChatMessage message="Hey There!" sender="bot" />
          <ChatMessage message="Whats the date today?" sender="user" />
          <ChatMessage message="Today is 26 May" sender="bot" />
        </>
      );
      const container = document.querySelector(".navbar");
      ReactDOM.createRoot(container).render(inp);
    </script>
  </body>
</html>
